<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoCV Maker</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel untuk kompilasi JSX di browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Library untuk konversi HTML ke PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    
    /* Custom Scrollbar */
    .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-slate-50 to-cyan-50 text-slate-800 selection:bg-indigo-200 min-h-screen">
  
  <div id="root"></div>

  <!-- Tipe text/babel memberitahu browser untuk mengkompilasi JSX menggunakan Babel -->
  <script type="text/babel">
    const { useState, useRef, forwardRef } = React;

    // --- ICONS (SVG) ---
    const IconPhone = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>;
    const IconMail = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>;
    const IconGlobe = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/></svg>;
    const IconMapPin = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
    const IconUpload = () => <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
    const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>;
    const IconTrash2 = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
    const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
    const IconEye = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>;

    // --- CV PREVIEW COMPONENT ---
    const CVPreview = forwardRef(({ data }, ref) => {
      const { personalInfo, education, expertise, experience } = data;

      return (
        <div ref={ref} className="w-[794px] h-[1123px] bg-white shadow-2xl flex flex-col relative overflow-hidden" style={{ fontFamily: "'Inter', sans-serif" }}>
          <div className="flex w-full h-[240px] bg-white shrink-0">
            <div className="w-[35%] h-full flex items-center justify-center">
              <div className="w-48 h-48 rounded-full overflow-hidden bg-gray-200 flex items-center justify-center">
                {personalInfo.photo ? (
                  <img src={personalInfo.photo} alt="Profile" className="w-full h-full object-cover" />
                ) : (
                  <span className="text-gray-400 text-sm">No Photo</span>
                )}
              </div>
            </div>
            <div className="w-[65%] h-full flex flex-col justify-center pl-8 pt-8">
              <h1 className="text-6xl font-black text-zinc-800 tracking-tight uppercase leading-none mb-2">
                {personalInfo.name || 'Dedi Riyanto'}
              </h1>
              <h2 className="text-2xl text-zinc-500 font-medium tracking-widest uppercase">
                {personalInfo.title || 'UI / UX Designer'}
              </h2>
            </div>
          </div>

          <div className="flex flex-1 w-full">
            <div className="w-[35%] bg-[#2b2b2b] text-white py-10 px-8 flex flex-col gap-10">
              <section>
                <h3 className="text-lg font-bold tracking-widest uppercase border-b border-white/20 pb-2 mb-6">Contact</h3>
                <div className="flex flex-col gap-5 text-sm font-light">
                  <div className="flex items-center gap-4"><IconPhone /><span>{personalInfo.phone || '+123-456-7890'}</span></div>
                  <div className="flex items-center gap-4"><IconMail /><span className="break-all">{personalInfo.email || 'hello@reallygreatsite.com'}</span></div>
                  <div className="flex items-start gap-4"><div className="mt-1"><IconMapPin /></div><span>{personalInfo.address || '123 Anywhere St., Any City, ST 12345'}</span></div>
                </div>
              </section>

              <section>
                <h3 className="text-lg font-bold tracking-widest uppercase border-b border-white/20 pb-2 mb-6">Education</h3>
                <div className="flex flex-col gap-6">
                  {education.map((edu) => (
                    <div key={edu.id} className="flex flex-col">
                      <h4 className="font-bold text-base">{edu.course || 'Course Studied'}</h4>
                      <p className="text-sm text-white/90">{edu.university || 'University/College Details'}</p>
                      <p className="text-sm text-white/70 mt-1">{edu.year || '2006 - 2008'}</p>
                    </div>
                  ))}
                </div>
              </section>

              <section>
                <h3 className="text-lg font-bold tracking-widest uppercase border-b border-white/20 pb-2 mb-6">Expertise</h3>
                <ul className="flex flex-col gap-4 text-sm font-light list-disc pl-5">
                  {expertise.map((exp) => (
                    <li key={exp.id} className="pl-2">{exp.skill || 'UI/UX'}</li>
                  ))}
                </ul>
              </section>
            </div>

            <div className="w-[65%] bg-white py-10 px-10 flex flex-col gap-10">
              <section>
                <h3 className="text-lg font-bold tracking-widest uppercase border-b border-zinc-300 pb-2 mb-6 text-zinc-800">Profile Summary</h3>
                <p className="text-zinc-500 text-sm leading-relaxed text-justify">
                  {personalInfo.summary || 'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nullam pharetra in lorem at laoreet. Donec hendrerit libero eget est tempor, quis tempus arcu elementum. In elementum elit at dui tristique feugiat. Mauris convallis, mi at mattis malesuada, neque nulla volutpat dolor, hendrerit faucibus eros nibh ut nunc. Proin luctus urna id nunc sagittis dignissim.'}
                </p>
              </section>

              <section>
                <h3 className="text-lg font-bold tracking-widest uppercase border-b border-zinc-300 pb-2 mb-6 text-zinc-800">Work Experience</h3>
                <div className="flex flex-col gap-8">
                  {experience.map((exp) => (
                    <div key={exp.id} className="flex flex-col">
                      <div className="flex justify-between items-baseline mb-1">
                        <h4 className="text-base text-zinc-600">{exp.position || 'Job position here'}</h4>
                        <span className="text-zinc-800 font-bold text-sm">{exp.year || '2019 - 2022'}</span>
                      </div>
                      <h5 className="font-bold text-zinc-800 mb-2 text-sm">{exp.company || 'Company Name'} | {exp.location || 'Location'}</h5>
                      <p className="text-zinc-500 text-sm leading-relaxed text-justify">
                        {exp.description || 'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nullam pharetra in lorem at laoreet. Donec hendrerit libero eget est tempor, quis tempus arcu elementum. In elementum elit at dui tristique feugiat.'}
                      </p>
                    </div>
                  ))}
                </div>
              </section>
            </div>
          </div>
        </div>
      );
    });

    // --- CV FORM COMPONENT ---
    function CVForm({ data, onChange }) {
      const updatePersonalInfo = (field, value) => {
        onChange({ ...data, personalInfo: { ...data.personalInfo, [field]: value } });
      };

      const handlePhotoUpload = (e) => {
        const file = e.target.files?.[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => updatePersonalInfo('photo', reader.result);
          reader.readAsDataURL(file);
        }
      };

      const addItem = (key, item) => onChange({ ...data, [key]: [...data[key], item] });
      const updateItem = (key, id, field, value) => {
        const newArray = data[key].map(item => item.id === id ? { ...item, [field]: value } : item);
        onChange({ ...data, [key]: newArray });
      };
      const removeItem = (key, id) => {
        const newArray = data[key].filter(item => item.id !== id);
        onChange({ ...data, [key]: newArray });
      };

      return (
        <div className="flex flex-col gap-8 w-full max-w-2xl mx-auto p-6 bg-white/40 backdrop-blur-xl border border-white/50 shadow-2xl rounded-3xl">
          <section className="flex flex-col gap-4">
            <h2 className="text-2xl font-bold text-slate-800 border-b border-slate-300/50 pb-2">Personal Information</h2>
            <div className="flex items-center gap-4 mb-2">
              <div className="w-24 h-24 rounded-full overflow-hidden bg-white/50 border-2 border-white shadow-sm flex items-center justify-center relative group cursor-pointer">
                {data.personalInfo.photo ? (
                  <img src={data.personalInfo.photo} alt="Profile" className="w-full h-full object-cover" />
                ) : (
                  <div className="text-slate-400 group-hover:text-indigo-500 transition-colors"><IconUpload /></div>
                )}
                <input type="file" accept="image/*" onChange={handlePhotoUpload} className="absolute inset-0 opacity-0 cursor-pointer" />
              </div>
              <div className="text-sm text-slate-500">
                <p className="font-medium text-slate-700">Profile Photo</p>
                <p>Click to upload a professional photo</p>
              </div>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <input type="text" placeholder="Full Name" value={data.personalInfo.name} onChange={(e) => updatePersonalInfo('name', e.target.value)} className="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/40 focus:bg-white focus:ring-2 focus:ring-indigo-400 outline-none transition-all shadow-sm" />
              <input type="text" placeholder="Job Title" value={data.personalInfo.title} onChange={(e) => updatePersonalInfo('title', e.target.value)} className="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/40 focus:bg-white focus:ring-2 focus:ring-indigo-400 outline-none transition-all shadow-sm" />
              <input type="text" placeholder="Phone Number" value={data.personalInfo.phone} onChange={(e) => updatePersonalInfo('phone', e.target.value)} className="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/40 focus:bg-white focus:ring-2 focus:ring-indigo-400 outline-none transition-all shadow-sm" />
              <input type="email" placeholder="Email Address" value={data.personalInfo.email} onChange={(e) => updatePersonalInfo('email', e.target.value)} className="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/40 focus:bg-white focus:ring-2 focus:ring-indigo-400 outline-none transition-all shadow-sm" />
              <input type="text" placeholder="Address" value={data.personalInfo.address} onChange={(e) => updatePersonalInfo('address', e.target.value)} className="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/40 focus:bg-white focus:ring-2 focus:ring-indigo-400 outline-none transition-all shadow-sm" />
            </div>
            <textarea placeholder="Profile Summary" value={data.personalInfo.summary} onChange={(e) => updatePersonalInfo('summary', e.target.value)} rows={4} className="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/40 focus:bg-white focus:ring-2 focus:ring-indigo-400 outline-none transition-all shadow-sm resize-none"></textarea>
          </section>

          <section className="flex flex-col gap-4">
            <div className="flex justify-between items-center border-b border-slate-300/50 pb-2">
              <h2 className="text-2xl font-bold text-slate-800">Education</h2>
              <button onClick={() => addItem('education', { id: Date.now().toString(), course: '', university: '', year: '' })} className="p-2 bg-indigo-100 text-indigo-600 rounded-lg hover:bg-indigo-200 transition-colors"><IconPlus /></button>
            </div>
            {data.education.map((edu) => (
              <div key={edu.id} className="relative grid grid-cols-1 md:grid-cols-2 gap-4 p-4 bg-white/40 rounded-2xl border border-white/50 shadow-sm">
                <button onClick={() => removeItem('education', edu.id)} className="absolute -top-2 -right-2 p-1.5 bg-red-100 text-red-500 rounded-full hover:bg-red-200 transition-colors shadow-sm"><IconTrash2 /></button>
                <input type="text" placeholder="Course Studied" value={edu.course} onChange={(e) => updateItem('education', edu.id, 'course', e.target.value)} className="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/40 focus:bg-white focus:ring-2 focus:ring-indigo-400 outline-none transition-all" />
                <input type="text" placeholder="University / College" value={edu.university} onChange={(e) => updateItem('education', edu.id, 'university', e.target.value)} className="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/40 focus:bg-white focus:ring-2 focus:ring-indigo-400 outline-none transition-all" />
                <input type="text" placeholder="Year (e.g. 2006 - 2008)" value={edu.year} onChange={(e) => updateItem('education', edu.id, 'year', e.target.value)} className="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/40 focus:bg-white focus:ring-2 focus:ring-indigo-400 outline-none transition-all md:col-span-2" />
              </div>
            ))}
          </section>

          <section className="flex flex-col gap-4">
            <div className="flex justify-between items-center border-b border-slate-300/50 pb-2">
              <h2 className="text-2xl font-bold text-slate-800">Expertise / Skills</h2>
              <button onClick={() => addItem('expertise', { id: Date.now().toString(), skill: '' })} className="p-2 bg-indigo-100 text-indigo-600 rounded-lg hover:bg-indigo-200 transition-colors"><IconPlus /></button>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
              {data.expertise.map((exp) => (
                <div key={exp.id} className="relative flex items-center">
                  <input type="text" placeholder="Skill (e.g. UI/UX)" value={exp.skill} onChange={(e) => updateItem('expertise', exp.id, 'skill', e.target.value)} className="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/40 focus:bg-white focus:ring-2 focus:ring-indigo-400 outline-none transition-all pr-10" />
                  <button onClick={() => removeItem('expertise', exp.id)} className="absolute right-2 p-1.5 text-red-400 hover:text-red-600 transition-colors"><IconTrash2 /></button>
                </div>
              ))}
            </div>
          </section>

          <section className="flex flex-col gap-4">
            <div className="flex justify-between items-center border-b border-slate-300/50 pb-2">
              <h2 className="text-2xl font-bold text-slate-800">Work Experience</h2>
              <button onClick={() => addItem('experience', { id: Date.now().toString(), position: '', company: '', location: '', year: '', description: '' })} className="p-2 bg-indigo-100 text-indigo-600 rounded-lg hover:bg-indigo-200 transition-colors"><IconPlus /></button>
            </div>
            {data.experience.map((exp) => (
              <div key={exp.id} className="relative grid grid-cols-1 md:grid-cols-2 gap-4 p-4 bg-white/40 rounded-2xl border border-white/50 shadow-sm">
                <button onClick={() => removeItem('experience', exp.id)} className="absolute -top-2 -right-2 p-1.5 bg-red-100 text-red-500 rounded-full hover:bg-red-200 transition-colors shadow-sm"><IconTrash2 /></button>
                <input type="text" placeholder="Job Position" value={exp.position} onChange={(e) => updateItem('experience', exp.id, 'position', e.target.value)} className="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/40 focus:bg-white focus:ring-2 focus:ring-indigo-400 outline-none transition-all" />
                <input type="text" placeholder="Year (e.g. 2019 - 2022)" value={exp.year} onChange={(e) => updateItem('experience', exp.id, 'year', e.target.value)} className="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/40 focus:bg-white focus:ring-2 focus:ring-indigo-400 outline-none transition-all" />
                <input type="text" placeholder="Company Name" value={exp.company} onChange={(e) => updateItem('experience', exp.id, 'company', e.target.value)} className="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/40 focus:bg-white focus:ring-2 focus:ring-indigo-400 outline-none transition-all" />
                <input type="text" placeholder="Location" value={exp.location} onChange={(e) => updateItem('experience', exp.id, 'location', e.target.value)} className="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/40 focus:bg-white focus:ring-2 focus:ring-indigo-400 outline-none transition-all" />
                <textarea placeholder="Job Description" value={exp.description} onChange={(e) => updateItem('experience', exp.id, 'description', e.target.value)} rows={3} className="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/40 focus:bg-white focus:ring-2 focus:ring-indigo-400 outline-none transition-all md:col-span-2 resize-none"></textarea>
              </div>
            ))}
          </section>
        </div>
      );
    }

    // --- MAIN APP COMPONENT ---
    const initialData = {
      personalInfo: {
        name: 'Dedi Riyanto',
        title: 'Asistant Vice President',
        phone: '+62-81234567890',
        email: 'dedynamoza@gmail.com',
        website: 'www.reallygreatsite.com',
        address: '123 Anywhere St., Any City, ST 12345',
        summary: 'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nullam pharetra in lorem at laoreet. Donec hendrerit libero eget est tempor, quis tempus arcu elementum. In elementum elit at dui tristique feugiat. Mauris convallis, mi at mattis malesuada, neque nulla volutpat dolor, hendrerit faucibus eros nibh ut nunc. Proin luctus urna id nunc sagittis dignissim.',
        photo: null,
      },
      education: [
        { id: '1', course: 'Course Studied', university: 'University/College Details', year: '2006 - 2008' },
        { id: '2', course: 'Course Studied', university: 'University/College Details', year: '2006 - 2008' },
        { id: '3', course: 'Course Studied', university: 'University/College Details', year: '2006 - 2008' },
      ],
      expertise: [
        { id: '1', skill: 'UI/UX' },
        { id: '2', skill: 'Visual Design' },
        { id: '3', skill: 'Wireframes' },
        { id: '4', skill: 'Storyboards' },
        { id: '5', skill: 'User Flows' },
        { id: '6', skill: 'Process Flows' },
      ],
      experience: [
        { id: '1', position: 'Job position here', company: 'Company Name', location: 'Location', year: '2019 - 2022', description: 'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nullam pharetra in lorem at laoreet. Donec hendrerit libero eget est tempor, quis tempus arcu elementum. In elementum elit at dui tristique feugiat.' },
        { id: '2', position: 'Job position here', company: 'Company Name', location: 'Location', year: '2017 - 2019', description: 'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nullam pharetra in lorem at laoreet. Donec hendrerit libero eget est tempor, quis tempus arcu elementum. In elementum elit at dui tristique feugiat.' },
        { id: '3', position: 'Job position here', company: 'Company Name', location: 'Location', year: '2015 - 2017', description: 'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nullam pharetra in lorem at laoreet. Donec hendrerit libero eget est tempor, quis tempus arcu elementum. In elementum elit at dui tristique feugiat.' },
      ],
    };

    function App() {
      const [cvData, setCvData] = useState(initialData);
      const [isGenerating, setIsGenerating] = useState(false);
      const [showPreview, setShowPreview] = useState(false);
      const printRef = useRef(null);

      const handleDownloadPdf = async () => {
        const element = printRef.current;
        if (!element) return;

        setIsGenerating(true);
        try {
          // Explicitly use window.html2canvas and window.jspdf to avoid reference errors
          const canvas = await window.html2canvas(element, { scale: 2, useCORS: true, logging: false });
          const imgData = canvas.toDataURL('image/png');
          
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
          
          const pdfWidth = pdf.internal.pageSize.getWidth();
          const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
          
          pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
          pdf.save(`${cvData.personalInfo.name || 'CV'}.pdf`);
        } catch (error) {
          console.error('Error generating PDF:', error);
          alert('Failed to generate PDF. Please try again.');
        } finally {
          setIsGenerating(false);
        }
      };

      return (
        <div>
          <header className="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-slate-200/50 px-6 py-4 flex items-center justify-between shadow-sm">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                <span className="text-white font-bold text-xl">CV</span>
              </div>
              <h1 className="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-cyan-600 hidden sm:block">
                AutoCV Maker
              </h1>
            </div>
            <div className="flex items-center gap-3">
              <button onClick={() => setShowPreview(!showPreview)} className="lg:hidden flex items-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-xl text-slate-700 font-medium hover:bg-slate-50 transition-colors shadow-sm">
                <IconEye /> {showPreview ? 'Edit' : 'Preview'}
              </button>
              <button onClick={handleDownloadPdf} disabled={isGenerating} className="flex items-center gap-2 px-5 py-2.5 bg-indigo-600 text-white rounded-xl font-medium hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200 disabled:opacity-70 disabled:cursor-not-allowed">
                <IconDownload /> {isGenerating ? 'Generating...' : 'Download PDF'}
              </button>
            </div>
          </header>

          <main className="max-w-[1600px] mx-auto p-4 sm:p-6 lg:p-8 flex flex-col lg:flex-row gap-8 items-start justify-center">
            <div className={`w-full lg:w-[45%] xl:w-[40%] ${showPreview ? 'hidden lg:block' : 'block'} overflow-auto max-h-[calc(100vh-8rem)] rounded-2xl custom-scrollbar`}>
              <CVForm data={cvData} onChange={setCvData} />
            </div>
            <div className={`w-full lg:w-[55%] xl:w-[60%] flex justify-center ${!showPreview ? 'hidden lg:flex' : 'flex'}`}>
              <div className="overflow-auto max-h-[calc(100vh-8rem)] rounded-2xl shadow-2xl border border-slate-200/50 bg-white custom-scrollbar">
                <div className="origin-top scale-[0.45] sm:scale-[0.6] md:scale-[0.8] lg:scale-[0.7] xl:scale-[0.85] 2xl:scale-100 transition-transform duration-300">
                  <CVPreview data={cvData} ref={printRef} />
                </div>
              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
